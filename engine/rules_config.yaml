regex_rules:
  - id: "RG-PHONE-CN"
    name: "PII-中国手机号"
    pattern: "(?<!\\d)1[3-9]\\d{9}(?!\\d)"
    level: "desensitize"
    enabled: true
    replacement: "phone"
    description: "阶段 2 中国大陆手机号脱敏"
  - id: "RG-PHONE-INTL"
    name: "PII-国际电话"
    pattern: "(?<!\\d)(?:\\+|00)[1-9]\\d{0,2}[ -]?(?:\\d[ -]?){7,12}\\d(?!\\d)"
    level: "desensitize"
    enabled: true
    replacement: "phone"
    description: "阶段 2 国际电话格式脱敏（必须带 + 或 00 前缀，避免误识别纯数字串）"
  - id: "RG-EXPANSION-001"
    name: "扩展-身份证号"
    pattern: "(?<!\\d)[1-9]\\d{5}(?:19|20)\\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\\d|3[01])\\d{3}[\\dXx](?!\\w)"
    level: "block"
    enabled: false
    description: "阶段 7 扩展规则预留"
  - id: "RG-EXPANSION-002"
    name: "扩展-OpenAI API Key"
    pattern: "sk-[A-Za-z0-9_-]{20,}"
    level: "block"
    enabled: false
    description: "阶段 7 扩展规则预留"
  - id: "RG-EXPANSION-003"
    name: "扩展-邮箱地址"
    pattern: "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
    level: "warn"
    enabled: false
    description: "阶段 7 扩展规则预留"
  - id: "RG-EXPANSION-004"
    name: "扩展-银行卡号"
    pattern: "(?<!\\d)(?:\\d[ -]?){16,19}(?!\\d)"
    level: "block"
    enabled: false
    description: "阶段 7 扩展规则预留"
  - id: "RG-EXPANSION-005"
    name: "扩展-内网 IPv4"
    pattern: "(?<!\\d)(?:10|172\\.(?:1[6-9]|2\\d|3[01])|192\\.168)\\.(?:\\d{1,3}\\.){1}\\d{1,3}(?!\\d)"
    level: "warn"
    enabled: false
    description: "阶段 7 扩展规则预留"
  - id: "RG-EXPANSION-006"
    name: "扩展-JWT"
    pattern: "eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}"
    level: "block"
    enabled: false
    description: "阶段 7 扩展规则预留"
  - id: "RG-EXPANSION-007"
    name: "扩展-AWS Access Key"
    pattern: "AKIA[0-9A-Z]{16}"
    level: "block"
    enabled: false
    description: "阶段 7 扩展规则预留"
  - id: "RG-EXPANSION-008"
    name: "扩展-私钥块"
    pattern: "-----BEGIN (?:RSA |OPENSSH |EC )?PRIVATE KEY-----"
    level: "block"
    enabled: false
    description: "阶段 7 扩展规则预留"
