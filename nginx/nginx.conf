worker_processes auto;

events {
    worker_connections 4096;
}

http {
    upstream safetyhub_app {
        server safetyhub:8000;
        keepalive 1024;
    }

    # 共用的反代参数：把真实协议、Host、客户端 IP、Request ID 透传给后端
    # 后端 uvicorn 启用 --proxy-headers 后，会基于 X-Forwarded-Proto 判定 https，
    # 从而让 set_cookie(secure=True) 在浏览器侧能正常落地。
    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $scheme;
        ""      $scheme;
        ~.+     $http_x_forwarded_proto;
    }

    # HTTP 入口：仅用于 ACME 健康检查与跳转到 HTTPS。
    # 如果上游已有专门的 HTTPS 网关在做 TLS 终结，这里也允许 HTTP 直接代理，
    # 通过 X-Forwarded-Proto=https 让后端识别为 HTTPS。
    server {
        listen 80;
        server_name llm-safetyhub.nanfu.com;

        # 健康检查端点保持 HTTP 可访问，方便 LB / 容器探针
        location /health/ {
            proxy_pass http://safetyhub_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        # 其余流量统一跳转到 HTTPS，避免管理后台 Secure cookie 在 HTTP 下被丢弃
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS 入口：管理后台与 /v1 业务接口的真实流量入口
    server {
        listen 443 ssl;
        http2 on;
        server_name llm-safetyhub.nanfu.com;

        ssl_certificate     /etc/nginx/certs/safetyhub.crt;
        ssl_certificate_key /etc/nginx/certs/safetyhub.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1h;

        client_max_body_size 20m;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        location = / {
            return 302 /admin/;
        }

        location /health/ {
            proxy_pass http://safetyhub_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /v1/ {
            proxy_pass http://safetyhub_app;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /admin/ {
            proxy_pass http://safetyhub_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
