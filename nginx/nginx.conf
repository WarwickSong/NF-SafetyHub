worker_processes auto;

events {
    worker_connections 4096;
}

http {
    upstream safetyhub_app {
        server safetyhub:8000;
        keepalive 1024;
    }

    # 共用的反代参数：把真实协议、Host、客户端 IP、Request ID 透传给后端
    # 后端 uvicorn 启用 --proxy-headers 后，会基于 X-Forwarded-Proto 判定 https，
    # 从而让 set_cookie(secure=True) 在浏览器侧能正常落地。
    map $http_x_forwarded_proto $proxy_x_forwarded_proto {
        default $scheme;
        ""      $scheme;
        ~.+     $http_x_forwarded_proto;
    }

    server {
        listen 80;
        server_name llm-safetyhub.nanfu.com;

        client_max_body_size 20m;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        location = / {
            return 302 /admin/;
        }

        location /health/ {
            proxy_pass http://safetyhub_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        location /v1/ {
            proxy_pass http://safetyhub_app;
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }

        location /admin/ {
            proxy_pass http://safetyhub_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        }
    }
}
