<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>消息归档 - SafetyHub</title>
  <link rel="stylesheet" href="/admin/css/style.css">
</head>
<body data-page="archives">
  <nav class="sidebar">
    <div class="brand">SafetyHub</div>
    <a href="/admin/index.html">仪表盘</a>
    <a class="active" href="/admin/archives.html">消息归档</a>
    <a href="/admin/blocks.html">拦截审计</a>
    <a href="/admin/observations.html">上线观测</a>
    <a href="/admin/rules.html">规则</a>
    <a href="/admin/api_keys.html">APIKey</a>
    <a href="/admin/approvals.html">审批</a>
    <a href="/admin/settings.html">设置</a>
  </nav>
  <main class="content">
    <header class="topbar"><div><h1>消息归档</h1><p>支持按用户、模型、动作、关键词筛选归档记录。</p></div><button class="button" data-refresh>刷新</button></header>
    <section class="card filters">
      <input id="filterUser" placeholder="用户 ID">
      <input id="filterModel" placeholder="模型">
      <select id="filterAction"><option value="">全部动作</option><option value="passed">passed</option><option value="desensitized">desensitized</option><option value="blocked">blocked</option></select>
      <input id="filterKeyword" placeholder="关键词">
      <button class="button" id="applyArchiveFilters">查询</button>
    </section>
    <section class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>Request ID</th><th>模型</th><th>动作</th><th>命中规则</th><th>时间</th></tr></thead><tbody id="archivesTable"></tbody></table></div></section>
    <section class="card"><h2>详情</h2><pre id="archiveDetail">点击记录查看详情</pre></section>
  </main>
  <script src="/admin/js/app.js"></script>
</body>
</html>
