<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 - SafetyHub</title>
  <link rel="stylesheet" href="/admin/css/style.css">
</head>
<body data-page="login" class="login-body">
  <main class="login-page">
    <section class="login-card">
      <h1>SafetyHub 管理后台</h1>
      <p>请输入管理员账号密码登录。</p>
      <form id="loginForm" class="login-form">
        <label>用户名<input id="loginUsername" name="username" autocomplete="username" value="admin"></label>
        <label>密码<input id="loginPassword" name="password" type="password" autocomplete="current-password" autofocus></label>
        <button class="button" type="submit">登录</button>
      </form>
      <p id="loginMessage" class="login-message"></p>
    </section>
  </main>
  <script src="/admin/js/app.js"></script>
</body>
</html>
