services:
  postgres:
    image: postgres:16-alpine
    container_name: safetyhub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-safetyhub}
      POSTGRES_USER: ${POSTGRES_USER:-safetyhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-local-env}
    volumes:
      - ${SAFETYHUB_POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-safetyhub} -d $${POSTGRES_DB:-safetyhub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  safetyhub:
    image: ${SAFETYHUB_IMAGE:-nf-safetyhub-safetyhub:latest}
    build: .
    container_name: safetyhub-app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ${SAFETYHUB_DATA_DIR:-./data/app}:/app/data
      - ${SAFETYHUB_RULES_CONFIG:-./engine/rules_config.yaml}:/app/engine/rules_config.yaml
      - ${SYSTEM_DISK_MONITOR_PATH:-/}:${SYSTEM_DISK_MONITOR_CONTAINER_PATH:-/mnt/system-disk}:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: safetyhub-nginx
    depends_on:
      - safetyhub
    ports:
      - "${SAFETYHUB_HTTP_PORT:-80}:80"
      - "${SAFETYHUB_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 证书目录由部署方下发，包含 safetyhub.crt / safetyhub.key
      - ${SAFETYHUB_TLS_CERT_DIR:-./nginx/certs}:/etc/nginx/certs:ro
    restart: unless-stopped
