services:
  safetyhub:
    build: .
    container_name: safetyhub-app
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - ${SAFETYHUB_DATA_DIR:-./data}:/app/data
      - ${SAFETYHUB_RULES_CONFIG:-./engine/rules_config.yaml}:/app/engine/rules_config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: safetyhub-nginx
    depends_on:
      - safetyhub
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
